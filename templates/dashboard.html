{% extends "base.html" %}

{% block title %}Dashboard — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Welcome back, {{ user["name"] }}!</h1>
            <p class="auth-subtitle">Your expense dashboard is coming soon.</p>
        </div>

        <div class="auth-card">
            <p style="color: var(--ink); text-align: center;">
                Expense tracking will be available in the next step.
                For now, you're successfully logged in to Spendly.
            </p>
        </div>

    </div>
</section>

{% endblock %}
